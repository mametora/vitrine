<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 500" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#e8912d"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Pepper's Ghost 筐体断面図</text>

  <!-- Enclosure outer box -->
  <rect x="80" y="50" width="360" height="390" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <rect x="88" y="58" width="344" height="374" rx="2" fill="#111" stroke="none"/>

  <!-- Inner label -->
  <text x="100" y="80" fill="#555" font-size="11">筐体内面（黒色塗装）</text>

  <!-- Dimensions - height -->
  <line x1="460" y1="50" x2="460" y2="440" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="455" y1="50" x2="475" y2="50" stroke="#888" stroke-width="1"/>
  <line x1="455" y1="440" x2="475" y2="440" stroke="#888" stroke-width="1"/>
  <line x1="468" y1="55" x2="468" y2="240" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="468" y1="435" x2="468" y2="250" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="478" y="248" fill="#888" font-size="11">~180mm</text>

  <!-- Pi 5 case bump at bottom -->
  <rect x="200" y="380" width="120" height="42" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <text x="260" y="400" text-anchor="middle" fill="#aaa" font-size="10">Raspberry Pi 5</text>
  <text x="260" y="414" text-anchor="middle" fill="#777" font-size="9">（背面マウント）</text>
  <!-- Heat vents on Pi case -->
  <line x1="210" y1="388" x2="225" y2="388" stroke="#444" stroke-width="1"/>
  <line x1="210" y1="392" x2="225" y2="392" stroke="#444" stroke-width="1"/>
  <line x1="295" y1="388" x2="310" y2="388" stroke="#444" stroke-width="1"/>
  <line x1="295" y1="392" x2="310" y2="392" stroke="#444" stroke-width="1"/>

  <!-- PI5-CASE-TD2 base plate -->
  <rect x="140" y="360" width="240" height="22" rx="2" fill="#333" stroke="#666" stroke-width="1.5"/>

  <!-- Display (face up) -->
  <rect x="165" y="340" width="190" height="22" rx="1" fill="#000" stroke="#4a90d9" stroke-width="2"/>
  <!-- Display active area with VRM silhouette hint -->
  <rect x="170" y="343" width="180" height="16" rx="1" fill="#0a0a2a"/>
  <!-- Simple VRM figure silhouette on display -->
  <ellipse cx="260" cy="347" rx="4" ry="4" fill="#00d2ff" opacity="0.6"/>
  <rect x="256" y="350" width="8" height="7" rx="1" fill="#00d2ff" opacity="0.5"/>
  <text x="260" y="337" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="bold">Touch Display 2（上向き）</text>

  <!-- Display dimensions -->
  <line x1="165" y1="370" x2="165" y2="378" stroke="#4a90d9" stroke-width="0.8"/>
  <line x1="355" y1="370" x2="355" y2="378" stroke="#4a90d9" stroke-width="0.8"/>
  <line x1="168" y1="375" x2="250" y2="375" stroke="#4a90d9" stroke-width="0.8" marker-end="url(#arrow-blue)"/>
  <line x1="352" y1="375" x2="270" y2="375" stroke="#4a90d9" stroke-width="0.8" marker-end="url(#arrow-blue)"/>
  <text x="260" y="383" text-anchor="middle" fill="#4a90d9" font-size="9">有効表示エリア 155mm</text>

  <!-- Half mirror at 45 degrees -->
  <line x1="145" y1="310" x2="375" y2="120" stroke="#88ccff" stroke-width="3" opacity="0.7"/>
  <line x1="145" y1="310" x2="375" y2="120" stroke="#aaddff" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- Half mirror label -->
  <text x="300" y="190" fill="#88ccff" font-size="12" font-weight="bold" transform="rotate(-39, 300, 190)">ハーフミラー</text>
  <text x="300" y="205" fill="#6699cc" font-size="10" transform="rotate(-39, 300, 205)">（アクリル 45°）</text>

  <!-- 45 degree angle indicator -->
  <path d="M155,310 L175,310 L165,298" fill="none" stroke="#88ccff" stroke-width="1"/>
  <text x="180" y="315" fill="#88ccff" font-size="10">45°</text>

  <!-- Light rays from display to mirror (reflected) -->
  <line x1="230" y1="340" x2="230" y2="230" stroke="#00d2ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="260" y1="340" x2="260" y2="210" stroke="#00d2ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="290" y1="340" x2="290" y2="190" stroke="#00d2ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Reflected virtual image (ghost figure) -->
  <g opacity="0.5">
    <!-- Head -->
    <ellipse cx="130" cy="190" rx="12" ry="14" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <!-- Body -->
    <line x1="130" y1="204" x2="130" y2="250" stroke="#00d2ff" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="130" y1="218" x2="112" y2="238" stroke="#00d2ff" stroke-width="1.2"/>
    <line x1="130" y1="218" x2="148" y2="238" stroke="#00d2ff" stroke-width="1.2"/>
    <!-- Legs -->
    <line x1="130" y1="250" x2="118" y2="280" stroke="#00d2ff" stroke-width="1.2"/>
    <line x1="130" y1="250" x2="142" y2="280" stroke="#00d2ff" stroke-width="1.2"/>
  </g>
  <text x="130" y="300" text-anchor="middle" fill="#00d2ff" font-size="10" opacity="0.7">反射像</text>
  <text x="130" y="313" text-anchor="middle" fill="#00d2ff" font-size="9" opacity="0.5">（浮遊フィギュア）</text>

  <!-- Viewer -->
  <g transform="translate(50, 100)">
    <!-- Eye symbol -->
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="none" stroke="#e8912d" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#e8912d" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#e8912d"/>
    <text x="0" y="22" text-anchor="middle" fill="#e8912d" font-size="11" font-weight="bold">観察者</text>
  </g>

  <!-- Line of sight -->
  <line x1="68" y1="100" x2="125" y2="185" stroke="#e8912d" stroke-width="1.2" stroke-dasharray="6,3" marker-start="url(#arrow-orange)"/>

  <!-- USB-C power cable coming out -->
  <line x1="340" y1="430" x2="340" y2="460" stroke="#e74c3c" stroke-width="2"/>
  <line x1="340" y1="460" x2="420" y2="460" stroke="#e74c3c" stroke-width="2"/>
  <rect x="420" y="450" width="70" height="20" rx="3" fill="#e74c3c" opacity="0.2" stroke="#e74c3c" stroke-width="1"/>
  <text x="455" y="464" text-anchor="middle" fill="#e74c3c" font-size="10">USB-C 電源</text>

  <!-- Dimensions - width -->
  <line x1="80" y1="455" x2="80" y2="465" stroke="#888" stroke-width="1"/>
  <line x1="440" y1="455" x2="440" y2="465" stroke="#888" stroke-width="1"/>
  <line x1="85" y1="462" x2="250" y2="462" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="435" y1="462" x2="270" y2="462" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="475" text-anchor="middle" fill="#888" font-size="11">~200mm</text>

  <!-- Ventilation note -->
  <rect x="88" y="425" width="15" height="3" rx="1" fill="#444"/>
  <rect x="88" y="431" width="15" height="3" rx="1" fill="#444"/>
  <text x="110" y="434" fill="#666" font-size="9">通気口</text>
</svg>
